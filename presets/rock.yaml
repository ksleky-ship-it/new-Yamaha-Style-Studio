    intro_bars: 8
    main_bars: 16
    fill_bars: 4
    rhythm_pattern: rock_standard
  instruments:
    drum_kit: rock_drums
    bass: rock_bass
    melody: electric_guitar
    harmony: organ

voice_mapping:
  drums: 127
  bass: 33
  vocals: 30
  other: 19

optimization:
  drum_pattern: rock_4beat
  quantization_strength: 0.9
  velocity_adjustment: 1.1